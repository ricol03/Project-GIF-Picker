id: io.ricol03.gifpicker

runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

command: io.ricol03.gifpicker

finish-args:
  - '--share=ipc'
  - '--socket=fallback-x11'
  - '--socket=wayland'

modules:
  - name: gifpicker
    buildsystem: meson
    sources:
      - type: dir
        path: .
